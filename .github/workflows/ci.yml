name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.11"
          bundler-cache: true

      - name: Validate rate tables
        run: bundle exec ruby bin/validate_tables

      - name: RSpec
        run: bundle exec rspec
